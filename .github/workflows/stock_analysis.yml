name: Taiwan Stock Post-Market Analysis

on:
  schedule:
    # 台灣時間週一至週五下午 14:00 執行 (UTC 時間為 06:00)
    # 為了避開 GitHub 排程整點塞車，將分鐘設為 47，小時設為 5 (相當於台灣時間 13:47，避開 14:00 整點塞車)
    - cron: '47 5 * * 1-5'
  repository_dispatch:
    types: [trigger_post_market]
  workflow_dispatch:

jobs:
  analyze-and-report:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出專案代碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # 快取 pip 依賴，加速執行

    - name: 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行分析與發送報告
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        GDRIVE_OAUTH_TOKEN: ${{ secrets.GDRIVE_OAUTH_TOKEN }}
      run: |
        python analyzer.py
